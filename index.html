<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('Skyhawk Offline Mode Ready!'))
                .catch((err) => console.log('Service Worker Failed:', err));
        }
    </script>
    <title>Skyhawk Login</title>
    <style>
        body { background: #1e1e1e; color: white; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #login-box { background: #2e2e2e; padding: 40px; border-radius: 12px; text-align: center; width: 300px; }
        input { width: 90%; padding: 10px; margin-top: 15px; border-radius: 8px; border: none; }
        button { margin-top: 20px; padding: 10px 20px; border-radius: 8px; border: none; background: #4caf50; color: white; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #error-message { color: #ff6b6b; margin-top: 10px; font-size: 14px; display: none; }
        #error-message.show { display: block; }
        #wifi-status { margin-top: 10px; font-size: 12px; padding: 5px; border-radius: 4px; }
        #wifi-status.connected { color: #4caf50; }
        #wifi-status.not-connected { color: #ff6b6b; }
        #wifi-status.checking { color: #ff9800; }
        .spinner { display: none; width: 20px; height: 20px; margin: 10px auto; border: 3px solid #f3f3f3; border-top: 3px solid #4caf50; border-radius: 50%; animation: spin 1s linear infinite; }
        .spinner.show { display: block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="login-box">
        <h2>Skyhawk Login</h2>
        <input type="password" id="password" placeholder="Enter Password">
        <input type="text" id="piCode" placeholder="Enter Drone Code (optional)">
        <button id="loginBtn" onclick="login()">Login</button>
        <div class="spinner" id="spinner"></div>
        <div id="wifi-status" class="checking">📶 Checking Wi-Fi...</div>
        <div id="error-message">Incorrect code. Please try again.</div>
    </div>

    <script>
        // ===== STATE =====
        let isOnSkyhawkWifi = false;
        let droneOnline = false;
        let isChecking = false;

        // ===== CHECK WIFI CONNECTION =====
        function checkWiFiConnection() {
            const wifiStatus = document.getElementById('wifi-status');
            wifiStatus.className = 'checking';
            wifiStatus.textContent = '📶 Checking Wi-Fi...';

            fetch('http://10.42.0', {
                method: 'GET',
                mode: 'cors',
                cache: 'no-cache'
            })
            .then(() => {
                isOnSkyhawkWifi = true;
                wifiStatus.className = 'connected';
                wifiStatus.textContent = '✅ Connected to SKYHAWK Wi-Fi';
                checkDroneStatus();
            })
            .catch(() => {
                isOnSkyhawkWifi = false;
                wifiStatus.className = 'not-connected';
                wifiStatus.textContent = '❌ Not connected to SKYHAWK Wi-Fi';
                droneOnline = false;
            });
        }

        // ===== CHECK DRONE STATUS FROM PI =====
        function checkDroneStatus() {
            if (!isOnSkyhawkWifi) return;
            const wifiStatus = document.getElementById('wifi-status');

            fetch('http://10.42.0status')
                .then(res => res.json())
                .then(data => {
                    if (data.droneOnline) {
                        droneOnline = true;
                        wifiStatus.className = 'connected';
                        wifiStatus.textContent = `✅ Connected to SKYHAWK Wi-Fi - Drone Online (Bat: ${data.battery}%)`;
                    }
                })
                .catch(() => {
                    wifiStatus.className = 'not-connected';
                    wifiStatus.textContent = '⚠️ Connected to Wi-Fi, but Drone Server is Unreachable';
                });
        }

        // ===== VERIFY CODE WITH PI =====
        function verifyCodeWithPi(code) {
            if (!isOnSkyhawkWifi) {
                return Promise.resolve({ success: false, message: "❌ Not connected to SKYHAWK Wi-Fi. Please connect to the drone's network." });
            }

            // 🎯 FIXED URL TYPE: Restored complete 10.42.0.1 IP and added correct /auth route link
            return fetch('http://10.42.0auth', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ code: code })
            })
            .then(res => {
                if (res.ok) {
                    return { success: true, message: '✅ Code verified! Drone is online.' };
                } else {
                    return { success: false, message: '❌ Incorrect drone code. Please try again.' };
                }
            })
            .catch(() => {
                return { success: false, message: '❌ Connection dropped. Verify Flask is running on the Pi.' };
            });
        }

        // ===== LOGIN FUNCTION =====
        async function login() {
            const pass = document.getElementById('password').value;
            const code = document.getElementById('piCode').value.trim();
            const errorMsg = document.getElementById('error-message');
            const loginBtn = document.getElementById('loginBtn');
            const spinner = document.getElementById('spinner');

            errorMsg.classList.remove('show');

            if (pass !== 'Maggy') {
                alert('Incorrect password');
                return;
            }

            if (code === '') {
                localStorage.setItem('authMode', 'guest');
                localStorage.removeItem('piCode');
                window.location.href = 'dashboard.html';
                return;
            }

            loginBtn.disabled = true;
            spinner.classList.add('show');

            const result = await verifyCodeWithPi(code);

            if (result.success) {
                localStorage.setItem('authMode', 'pilot');
                localStorage.setItem('piCode', code);
                window.location.href = 'dashboard.html';
            } else {
                errorMsg.textContent = result.message;
                errorMsg.classList.add('show');
                document.getElementById('piCode').value = '';
                document.getElementById('piCode').focus();
                loginBtn.disabled = false;
                spinner.xl.classList.remove('show');
            }
        }

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        window.addEventListener('load', function () {
            setTimeout(checkWiFiConnection, 1000);
            setInterval(checkWiFiConnection, 10000);
        });
    </script>
</body>
</html>
