<!DOCTYPE html>
<html>

<head>
    <title>Skyhawk Login</title>
    <style>
        body {
            background: #1e1e1e;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #login-box {
            background: #2e2e2e;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 300px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: #4caf50;
            color: white;
            cursor: pointer;
        }

        /* ADDED: Error message style */
        #error-message {
            color: #ff6b6b;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }

        #error-message.show {
            display: block;
        }
    </style>
</head>

<body>

    <div id="login-box">
        <h2>Skyhawk Login</h2>

        <!-- PASSWORD INPUT -->
        <input type="password" id="password" placeholder="Enter Password">

        <!-- PI CODE INPUT -->
        <input type="text" id="piCode" placeholder="Enter Drone Code (optional)">

        <button onclick="login()">Login</button>

        <!-- ADDED: Error message -->
        <div id="error-message">Incorrect code. Please try again.</div>
    </div>

    <script>
        function login() {
            const pass = document.getElementById("password").value;
            const code = document.getElementById("piCode").value.trim();
            const errorMsg = document.getElementById("error-message");

            // Hide error message
            errorMsg.classList.remove("show");

            // Password check - unchanged
            if (pass !== "Maggy") {
                alert("Incorrect password");
                return;
            }

            // CHANGED: If NO code is entered → Guest mode
            if (code === "") {
                localStorage.setItem("authMode", "guest");
                localStorage.removeItem("piCode");
                window.location.href = "dashboard.html";
                return;
            }

            // CHANGED: If code IS entered → Verify it
            // In real implementation, this would check with the Pi
            // For demo, "SKY-7F2K9P" is the correct code
            if (code === "SKY-7F2K9P") {
                localStorage.setItem("authMode", "pilot");
                localStorage.setItem("piCode", code);
                window.location.href = "dashboard.html";
            } else {
                // ADDED: Wrong code - show error message
                errorMsg.classList.add("show");
                document.getElementById("piCode").value = "";
                document.getElementById("piCode").focus();
            }
        }

        // ADDED: Allow Enter key to submit
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>

</body>

</html>
